<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Login</title>

<style>
@import url("https://fonts.googleapis.com/css2?family=Quicksand:wght@300&display=swap");

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Quicksand", sans-serif;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #e0e5ec;
  width: 100%;
  overflow: hidden;
}

.ring {
  position: relative;
  width: 650px;
  height: 650px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.ring i {
  position: absolute;
  inset: 0;
  border: 4px solid gray;
  transition: 0.5s;
}

.ring i:nth-child(1) {
  border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
  animation: animate 6s linear infinite;
}

.ring i:nth-child(2) {
  border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%;
  animation: animate 4s linear infinite;
}

.ring i:nth-child(3) {
  border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%;
  animation: animate2 10s linear infinite;
}

.ring:hover i {
  border: 6px solid var(--clr);
  filter: drop-shadow(0 0 20px var(--clr));
}

@keyframes animate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes animate2 {
  0% { transform: rotate(360deg); }
  100% { transform: rotate(0deg); }
}

.login {
  position: absolute;
  width: 450px;
  height:470px;
  border-radius: 50px;
  box-shadow: 
            -10px -10px 20px #ffffff,
             10px 10px 20px #b8bcc2;
  z-index: 9999;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 20px;
  background:#e0e5ec;
}

.login h2 {
  font-size: 2em;
  color: gray;
  font-weight: bold;
}

.login .inputBx {
  position: relative;
  width: 100%;
}
 .inputBx {
  display: flex;
  align-items: center;
  justify-content: center;
 }
.login .inputBx input {
  width: 270px;
  padding: 12px 20px;
  border: none;
  border-radius: 40px;
  font-size: 1.2em;
  background: #e0e5ec;
  box-shadow:
      inset 5px 5px 10px #b8bcc2,
            inset -5px -5px 10px #ffffff;
  outline: none;
}

.login .inputBx input[type="submit"] {
    box-shadow:
      -5px -5px 10px #ffffff,
       5px 5px 10px #b8bcc2;
    border: none;
    cursor: pointer;
}
.login .inputBx input[type="submit"]:hover {
    box-shadow:
            inset 5px 5px 10px #b8bcc2,
            inset -5px -5px 10px #ffffff;
    border: none;
    cursor: pointer;
}

.login .inputBx input::placeholder {
  color: gray;
}

.login .links {
  display: flex;
  justify-content: center;
  gap: 45px;
}

.links a {
  color: black;
  text-decoration: none;
}
svg text {
    text-transform: uppercase;
    font-size: 10rem;
    animation: stroke 10s infinite alternate;
    font-weight: bold;
    fill: transparent;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
}

@keyframes stroke {
    0% {
        stroke: black;
        stroke-width: 0;
        stroke-dashoffset: -25%;
        stroke-dasharray: 50% 0;
    }
    70% {
        stroke: black;
    }
    80% {
        stroke: black;
        stroke-width: 3;
    }
    100% {
        stroke: black;
        stroke-width: 0;
        stroke-dashoffset: 25%;
        stroke-dasharray:0 50%;
    }
  }
</style>

</head>

<body>

<div class="ring">
  <i style="--clr:#00ff0a;"></i>
  <i style="--clr: blue;"></i>
  <i style="--clr:#fffd44;"></i>

  <div class="login">
    
    <svg viewBox="0 0 1320 300">
        <text x="50%" y="50%" text-anchor="middle">
              LOG-IN
        </text>
    </svg>

    <div class="inputBx">
      <input type="text" placeholder="Username">
    </div>

    <div class="inputBx">
      <input type="password" placeholder="Password">
    </div>

    <div class="inputBx">
      <input type="submit" value="Sign in">
    </div>

    <div class="links">
      <a href="#">Forgot Password</a>
      <a href="#">Signup</a>
    </div>

  </div>
</div>

</body>
</html>
